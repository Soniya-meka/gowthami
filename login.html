<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Gowthami Institutions</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('images/login-bg.png') no-repeat center center/cover;
            position: relative;
        }

        .login-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 26, 59, 0.6);
            backdrop-filter: blur(5px);
        }

        .login-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-medium);
            width: 100%;
            max-width: 450px;
            animation: fadeInUp 0.8s ease-out;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header .logo {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            display: block;
        }

        .login-header h2 {
            font-size: 1.5rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        .login-header p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            background: #fdfdfd;
            transition: var(--transition);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.1);
        }

        .login-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .login-footer a {
            color: var(--accent-color);
            font-weight: 600;
        }

        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 20;
            color: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-home:hover {
            color: var(--accent-color);
        }

        .btn-login {
            margin-top: 1rem;
            font-size: 1rem;
            padding: 1rem;
        }
    </style>
</head>
<body class="login-page">
    <a href="index.html" class="back-home">← Back to Home</a>
    
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <span class="logo-accent">GOWTHAMI</span> INSTITUTIONS
            </div>
            <h2>Member Login</h2>
            <p>Access your dashboard and student portal</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Email or Student ID</label>
                <input type="text" id="username" placeholder="E.g. student_abc@gowthami.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-login">Sign In</button>
        </form>

        <div class="login-footer">
            <p>Forgot password? <a href="#">Click here</a></p>
            <p style="margin-top: 10px;">Not a member? <a href="index.html#contact">Request Access</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Authenticating...';
            btn.disabled = true;

            setTimeout(() => {
                alert('Welcome to Gowthami Institutions Dashboard! (Mock Authentication Successful)');
                window.location.href = 'index.html';
            }, 1500);
        });
    </script>
</body>
</html>
